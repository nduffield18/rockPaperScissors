            /* Create Function to randomize the computer choice*/
            function getComputerChoice () {
                /* Create Variable to store choice */
                let compChoice;
                /* Create a vairable to equal between 1 and 100 using a random number generator, and find remainder */
                let selection = (Math.floor(Math.random() * 100) + 1) % 3;
                /* 0 = rock, 1 = paper, 2 = scissors */
                if (selection === 0) {
                    compChoice = "Rock"
                }
                else if (selection === 1) {
                    compChoice = "Paper"
                }
                else {
                    compChoice = "Scisscors"
                }
                /* Return Selection */
                return compChoice;
            }

            /*Create Function to get the Human choice*/

                    humanChoice = humanChoice.charAt(0).toUpperCase() + humanChoice.slice(1).toLowerCase();
                    /* If statement to check if Valid*/
                    if ((humanChoice === "Rock") || (humanChoice === "Paper") || (humanChoice === "Scissors")) {
                        humanChoiceValid = true;
                    }
                    else {
                        humanChoiceValid = false;
                        console.log("Please enter a valid choise")
                    }
                }
                /*Retrun human choice*/
                return humanChoice;
            }
